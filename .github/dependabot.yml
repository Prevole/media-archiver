version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "weekly"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "build(deps)"

    labels:
      - "dependencies"

    groups:
      patch-and-minor:
        update-types:
          - "minor"
          - "patch"

